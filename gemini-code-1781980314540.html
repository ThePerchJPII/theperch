<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Perch | JPII Student Editorial & Newsletter</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Pinyon+Script&display=swap" rel="stylesheet">
    <style>
        /* Modern Substack-Inspired Editorial Design */
        :root {
            --bg-color: #fdfdfc;
            --text-main: #191919;
            --text-muted: #666666;
            --accent-navy: #1a252f;
            --accent-gold: #c5a059;
            --accent-gold-light: #f9f6f0;
            --border-color: #e5e5e0;
            --font-serif: "Georgia", Times, serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-serif);
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* Top Notification Bar */
        .top-bar {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            background: var(--accent-navy);
            color: #ffffff;
            text-align: center;
            padding: 8px 10px;
            font-weight: 600;
        }

        /* Main Editorial Header */
        header {
            border-bottom: 1px solid var(--border-color);
            padding: 3rem 1rem 1.5rem 1rem;
            background: #ffffff;
        }

        .header-container {
            max-width: 1140px;
            margin: 0 auto;
            text-align: center;
            position: relative;
        }

        /* Upscaled Custom Logo Typography emphasizing "Perch" */
        .logo-title {
            text-decoration: none;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .logo-the {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 8px;
            color: var(--accent-navy);
            line-height: 1;
            text-transform: uppercase;
            transition: color 0.2s ease;
        }

        .logo-perch {
            font-family: 'Pinyon Script', cursive;
            font-size: 6.5rem;
            color: var(--accent-navy);
            line-height: 0.6;
            margin-top: 0.4rem;
            margin-left: 0.8rem;
            font-weight: 400;
            transform: rotate(-3deg);
            display: inline-block;
            transition: color 0.2s ease;
        }

        .logo-title:hover .logo-the,
        .logo-title:hover .logo-perch {
            color: var(--accent-gold);
        }

        .subtitle {
            font-family: var(--font-sans);
            font-size: 0.95rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 1.5rem;
            margin-bottom: 1.5rem;
            font-weight: 500;
        }

        /* Navigation Menu */
        nav {
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 0;
            background: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 1rem;
        }

        nav ul {
            list-style: none;
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
        }

        nav ul li a {
            font-family: var(--font-sans);
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 0.5px;
            transition: color 0.2s ease;
        }

        nav ul li a:hover {
            color: var(--accent-gold);
        }

        .subscribe-btn-sm {
            font-family: var(--font-sans);
            background: var(--accent-navy);
            color: #ffffff;
            padding: 6px 14px;
            border-radius: 20px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            transition: background 0.2s;
        }

        .subscribe-btn-sm:hover {
            background: var(--accent-gold);
        }

        /* Layout Grid */
        .main-layout {
            max-width: 1140px;
            margin: 2.5rem auto;
            padding: 0 1.5rem;
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        @media (max-width: 850px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            nav .nav-container { flex-direction: column; gap: 15px; text-align: center; }
            .articles-feed h1, .articles-feed h2 { font-size: 2.2rem; }
            .logo-perch { font-size: 5rem; }
            .logo-the { font-size: 2rem; }
        }

        /* Subscription Callout */
        .substack-hero-cta {
            grid-column: 1 / -1;
            background: var(--accent-gold-light);
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 2.5rem;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 1rem;
        }

        .substack-hero-cta h2 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--accent-navy);
        }

        .substack-hero-cta p {
            font-family: var(--font-sans);
            color: var(--text-muted);
            max-width: 600px;
            margin: 0 auto 1.5rem auto;
            font-size: 1rem;
        }

        .cta-form {
            display: flex;
            justify-content: center;
            max-width: 450px;
            margin: 0 auto;
            gap: 10px;
        }

        .cta-input {
            flex: 1;
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            font-family: var(--font-sans);
            font-size: 1rem;
            outline: none;
            background-color: #ffffff;
        }

        .cta-submit {
            background: var(--accent-navy);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-family: var(--font-sans);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.2s;
        }

        .cta-submit:hover {
            background: var(--accent-gold);
        }

        /* Feed Layout */
        .articles-feed {
            display: flex;
            flex-direction: column;
            gap: 40px;
        }

        /* Article Styling */
        .featured-article, .praeco-featured {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 3rem;
        }

        .featured-label {
            font-family: var(--font-sans);
            font-size: 0.75rem;
            letter-spacing: 2px;
            font-weight: 700;
            color: var(--accent-gold);
            margin-bottom: 1rem;
        }

        .articles-feed h1, .articles-feed h2 {
            font-size: 3rem;
            line-height: 1.1;
            color: var(--accent-navy);
            margin-bottom: 1rem;
        }

        .articles-feed p {
            color: var(--text-muted);
            font-size: 1.05rem;
            max-width: 700px;
        }

        .read-more-btn {
            display: inline-block;
            margin-top: 1.5rem;
            text-decoration: none;
            color: var(--accent-navy);
            font-weight: 600;
            font-family: var(--font-sans);
        }

        .read-more-btn:hover {
            color: var(--accent-gold);
        }

        /* Content Placeholder State */
        .blank-body-slot {
            margin-top: 1rem;
            height: 60px;
            border: 1px dashed var(--border-color);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b0b0a8;
            font-family: var(--font-sans);
            font-size: 0.85rem;
            font-style: italic;
        }

        /* Editorial Board Layout (Left Aligned Section) */
        .editorial-board {
            max-width: 1140px;
            margin: 5rem auto 0 auto;
            padding: 0 1.5rem;
            grid-column: 1 / -1;
            text-align: left; /* Explicitly left-aligned */
        }

        .editorial-heading {
            font-family: var(--font-sans);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.9rem;
            color: var(--accent-gold);
            margin-bottom: 2rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
            text-align: left;
        }

        .bios-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 24px;
            margin-top: 15px;
            justify-content: start; /* Grid items align to left side */
        }

        .bio-card {
            background: #ffffff;
